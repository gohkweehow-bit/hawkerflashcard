<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>H1CL 小贩文化全屏闪卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .full-screen-app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            perspective: 1000px;
            touch-action: none;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.15, 0.85, 0.35, 1);
            position: relative;
            z-index: 10;
        }

        .card-header {
            padding-top: env(safe-area-inset-top, 20px);
            text-align: center;
            padding-bottom: 10px;
        }

        .back-style { background: #ffffff !important; }

        .main-word {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            word-break: break-all;
            padding: 0 20px;
        }

        .voice-trigger {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(124, 45, 18, 0.15);
            margin-bottom: 20px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .nav-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(124, 45, 18, 0.2);
            font-size: 2rem;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="full-screen-app" id="touch-area">
    <div class="card-container">
        <div class="nav-hint left-4">❮</div>
        <div class="nav-hint right-4">❯</div>

        <div id="main-card" class="card-inner" onclick="toggleCard()">
            <!-- 卡片页眉 -->
            <div class="card-header mt-4">
                <h1 class="text-orange-900/40 text-[10px] font-black uppercase tracking-[0.3em] mb-1">H1CL 专题闪卡</h1>
                <h2 class="text-orange-800 text-lg font-black tracking-tight">小贩文化</h2>
                <!-- 将操作指示语移至此处 -->
                <p class="text-[9px] font-bold text-orange-900/40 uppercase tracking-widest mt-1 mb-2">Swipe to Switch / Tap to Flip</p>
                <div class="inline-block bg-orange-600/10 px-3 py-0.5 rounded-full">
                    <span id="progress-info" class="text-orange-600 font-bold text-[10px]">1 / 20</span>
                </div>
            </div>

            <!-- 正面内容区 -->
            <div id="front-view" class="flex-1 flex flex-col items-center justify-around pb-12">
                <div class="flex-1 flex items-center justify-center">
                    <h2 id="word-front" class="main-word text-orange-900 text-center tracking-tighter">古早味</h2>
                </div>
                
                <div class="flex flex-col items-center">
                    <button onclick="event.stopPropagation(); speak();" class="voice-trigger active:scale-90 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 反面内容区 -->
            <div id="back-view" class="hidden flex-1 flex flex-col p-8 pt-4">
                <div class="border-b-4 border-orange-50 pb-6 mb-8">
                    <h3 id="word-back" class="text-4xl font-black text-slate-800 tracking-tighter">古早味</h3>
                    <p id="pinyin-text" class="text-2xl font-bold text-orange-500 italic mt-2">gǔ zǎo wèi</p>
                </div>
                
                <div class="space-y-10 flex-grow overflow-y-auto no-scrollbar">
                    <section>
                        <span class="block text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3">释义 Meaning</span>
                        <p id="meaning-text" class="text-xl text-slate-700 font-medium leading-relaxed bg-slate-50 p-6 rounded-3xl border border-slate-100">
                            Traditional flavor / Nostalgic taste
                        </p>
                    </section>
                    <section>
                        <span class="block text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3">搭配 Collocation</span>
                        <p id="usage-text" class="text-slate-800 font-bold text-2xl leading-snug"></p>
                    </section>
                </div>
                
                <div class="mt-8 text-center">
                    <span class="text-slate-300 text-[10px] font-bold uppercase tracking-widest">Tap to back</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const cards = [
        { word: "古早味", pinyin: "gǔ zǎo wèi", desc: "Traditional / Nostalgic flavor", coll: "这摊位的咖啡很有古早味。" },
        { word: "经济实惠", pinyin: "jīng jì shí huì", desc: "Economical and practical", coll: "小贩中心的美食既经济实惠又美味。" },
        { word: "阶层", pinyin: "jiē céng", desc: "Social class", coll: "这里聚集了社会各阶层的人。" },
        { word: "价廉物美", pinyin: "jià lián wù měi", desc: "Cheap and good quality", coll: "价廉物美是小贩中心的特点。" },
        { word: "传统风味", pinyin: "chuán tǒng fēng wèi", desc: "Traditional style", coll: "保留了多年不变的传统风味。" },
        { word: "气氛热闹", pinyin: "qì fēn rè nao", desc: "Lively atmosphere", coll: "每到周末，小贩中心总是气氛热闹。" },
        { word: "海南鸡饭", pinyin: "hǎi nán jī fàn", desc: "Hainanese Chicken Rice", coll: "海南鸡饭是享誉国际的狮城美食。" },
        { word: "印度煎饼", pinyin: "yìn dù jiān bing", desc: "Roti Prata", coll: "许多国人喜欢早餐吃印度煎饼。" },
        { word: "椰浆饭", pinyin: "yé jiāng fàn", desc: "Nasi Lemak", coll: "椰浆饭散发着浓郁的班兰叶香气。" },
        { word: "双薪家庭", pinyin: "shuāng xīn jiā tíng", desc: "Dual-income family", coll: "双薪家庭通常没时间在家里做饭。" },
        { word: "社会饭厅", pinyin: "shè huì fàn tīng", desc: "Social dining room", coll: "小贩中心是新加坡人的社会饭厅。" },
        { word: "集体记忆", pinyin: "jí tǐ jì yì", desc: "Collective memory", coll: "小贩中心承载了我们的集体记忆。" },
        { word: "归属感", pinyin: "guī shǔ gǎn", desc: "Sense of belonging", coll: "这些美食能增强我们对国家的归属感。" },
        { word: "开销", pinyin: "kāi xiāo", desc: "Expenses", coll: "在小贩中心用餐能减少日常生活开销。" },
        { word: "拉茶", pinyin: "lā chá", desc: "Teh Tarik", coll: "吃完早餐后，来一杯热腾腾的拉茶。" },
        { word: "鸡排饭", pinyin: "jī pái fàn", desc: "Chicken Cutlet Rice", coll: "西餐摊位的鸡排饭深受年轻人欢迎。" },
        { word: "福建虾面", pinyin: "fú jiàn xiā miàn", desc: "Hokkien Prawn Mee", coll: "这摊福建虾面的汤头非常鲜甜。" },
        { word: "拼桌", pinyin: "pīn zhuō", desc: "Sharing table", coll: "人多时，我们经常需要和陌生人拼桌。" },
        { word: "社交", pinyin: "shè jiāo", desc: "Socializing", coll: "小贩中心是街坊邻居社交的好地方。" },
        { word: "交流", pinyin: "jiāo liú", desc: "Exchange / Interaction", coll: "不同种族的人在这里交流互动。" }
    ];

    let current = 0;
    let isBack = false;
    let startX = 0;
    let startY = 0;

    const mainCard = document.getElementById('main-card');
    const touchArea = document.getElementById('touch-area');

    function update() {
        const item = cards[current];
        document.getElementById('word-front').innerText = item.word;
        document.getElementById('word-back').innerText = item.word;
        document.getElementById('pinyin-text').innerText = item.pinyin;
        document.getElementById('meaning-text').innerText = item.desc;
        document.getElementById('usage-text').innerHTML = item.coll.replace(item.word, `<span class="text-orange-600 border-b-2 border-orange-200">${item.word}</span>`);
        document.getElementById('progress-info').innerText = `${current + 1} / ${cards.length}`;
        
        isBack = false;
        document.getElementById('front-view').classList.remove('hidden');
        document.getElementById('back-view').classList.add('hidden');
        mainCard.classList.remove('back-style');
        mainCard.style.transform = 'translateX(0)';
    }

    function toggleCard() {
        isBack = !isBack;
        if (isBack) {
            mainCard.classList.add('back-style');
            document.getElementById('front-view').classList.add('hidden');
            document.getElementById('back-view').classList.remove('hidden');
        } else {
            mainCard.classList.remove('back-style');
            document.getElementById('front-view').classList.remove('hidden');
            document.getElementById('back-view').classList.add('hidden');
        }
    }

    function next() { if (current < cards.length - 1) { current++; update(); } }
    function prev() { if (current > 0) { current--; update(); } }
    function speak() {
        const msg = new SpeechSynthesisUtterance(cards[current].word);
        msg.lang = 'zh-CN';
        window.speechSynthesis.speak(msg);
    }

    touchArea.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }, false);

    touchArea.addEventListener('touchmove', (e) => {
        const moveX = e.touches[0].clientX - startX;
        const moveY = e.touches[0].clientY - startY;
        if (Math.abs(moveX) > Math.abs(moveY)) {
            mainCard.style.transform = `translateX(${moveX * 0.8}px) rotate(${moveX * 0.02}deg)`;
        }
    }, false);

    touchArea.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].clientX;
        const diff = startX - endX;
        if (diff > 100) { next(); } 
        else if (diff < -100) { prev(); } 
        else { mainCard.style.transform = 'translateX(0)'; }
    }, false);

    update();
</script>
</body>
</html>
